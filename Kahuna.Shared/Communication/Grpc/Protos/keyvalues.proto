  GRPC_OP_OUTCOME_NEW = 0;
  GRPC_OP_OUTCOME_ALREADY_PENDING = 1;
  GRPC_OP_OUTCOME_ALREADY_COMPLETED = 2;
  GRPC_OP_OUTCOME_REJECTED_SESSION_CLOSED = 3;
  GRPC_OP_OUTCOME_REJECTED_DUPLICATE = 4;
  GRPC_OP_OUTCOME_REJECTED_CAPACITY = 5;
}

