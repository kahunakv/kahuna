message GrpcRangeLockEntry {
  int32  TransactionIdNode      = 1;
  int64  TransactionIdPhysical  = 2;
  uint32 TransactionIdCounter   = 3;
  optional string StartKey      = 4;
  bool   StartInclusive         = 5;
  optional string EndKey        = 6;
  bool   EndInclusive           = 7;
  GrpcRangeLockMode Mode        = 8;
  int32  ExpiresNode            = 9;
  int64  ExpiresPhysical        = 10;
  uint32 ExpiresCounter         = 11;
}

message GrpcGetRangeLocksRequest {
  string KeySpace = 1;
}

message GrpcGetRangeLocksResponse {
  repeated GrpcRangeLockEntry Locks = 1;
}

message GrpcImportRangeLocksRequest {
  string KeySpace = 1;
  repeated GrpcRangeLockEntry Locks = 2;
}

message GrpcImportRangeLocksResponse {
  bool Success = 1;
}

message GrpcCompletionReceiptEntry {
  int32  TransactionIdNode     = 1;
  int64  TransactionIdPhysical = 2;
  uint32 TransactionIdCounter  = 3;
  string Key                   = 4;
  optional string RecordAnchorKey = 5;
  int32  Durability            = 6;
}

message GrpcImportCompletionReceiptsRequest {
  repeated GrpcCompletionReceiptEntry Receipts = 1;
  // Data partition whose Raft log the receipts must be replicated onto so every replica of the
  // destination range holds them after a split/merge handoff. Zero when the message is reused as an
  // on-disk snapshot container (no destination routing needed).
  int32 DestinationPartitionId = 2;
  // When true the batch forgets the listed receipts on every replica of the partition (a durable
  // coordinator acknowledgement releasing the proof) instead of recording them.
  bool Forget = 3;
}

message GrpcImportCompletionReceiptsResponse {
  bool Success = 1;
}

// A batch of coordinator decision records serialized as one CoordinatorDecisionSnapshotMessage blob.
message GrpcImportCoordinatorDecisionsRequest {
  bytes Records = 1;
  // Data partition whose Raft log the decision records must be replicated onto so every replica of
  // the destination range holds them after a split/merge handoff.
  int32 DestinationPartitionId = 2;
}

message GrpcImportCoordinatorDecisionsResponse {
  bool Success = 1;
}

