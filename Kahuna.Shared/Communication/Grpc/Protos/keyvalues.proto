// ── Register-remote operation registration (inter-node) ─────────────────────────────────

// Values mirror the server-side OperationKind exactly: the inter-node transport blind-casts the C# enum
// integer onto this field, so these numbers ARE the wire meaning. Keep them in lockstep with OperationKind
// and never renumber an existing member.
enum GrpcOperationKind {
  GRPC_OP_KIND_SET = 0;
  GRPC_OP_KIND_DELETE = 1;
  GRPC_OP_KIND_DELETE_MANY = 2;
  GRPC_OP_KIND_EXTEND = 3;
  GRPC_OP_KIND_GET = 4;
