syntax = "proto3";

package Kahuna.Server.Replication.Protos;

message KeyValueMessage {
  int32 type = 1;
  string key = 2;
  optional bytes value = 3;
  int64 revision = 4;
  int32 expireNode = 5;
  int64 expirePhysical = 6;
  uint32 expireCounter = 7;
  int32 lastUsedNode = 8;
  int64 lastUsedPhysical = 9;
  uint32 lastUsedCounter = 10;
  int32 lastModifiedNode = 11;
  int64 lastModifiedPhysical = 13;
  uint32 lastModifiedCounter = 14;
  int32 timeNode = 15;
  int64 timePhysical = 16;
  uint32 timeCounter = 17;
  optional bool noRevision = 18;
  // Interactive-transaction identity carried on committed persistent mutations so that applying or
  // restoring the committed value records a durable completion receipt. Zero for non-transactional
  // (single-shot) writes, which never need a receipt.
  int32 transactionIdNode = 19;
  int64 transactionIdPhysical = 20;
  uint32 transactionIdCounter = 21;
  // The transaction's record anchor (first confirmed persistent modified key), carried alongside the
  // transaction id in the receipt for the durable coordinator decision to match against.
  optional string recordAnchorKey = 22;
  // The initial durable coordinator decision record, present only on the anchor key's committed
  // mutation. Carrying it here means one committed proposal atomically applies the anchor value, its
  // completion receipt, and the CommitDecided record (anchor participant already acknowledged) — no
  // separate Raft round trip, and no window where the anchor value is visible without the decision.
  // Serialized CoordinatorDecisionSnapshotMessage holding exactly one record. Absent on every other key.
  optional bytes embeddedDecision = 23;
}